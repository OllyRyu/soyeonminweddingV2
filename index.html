<style>
  /* ============================================================
     BG4 · 루프탑 스카이 딥
     ============================================================ */
  :root{
    --bg:#edf4fb; --bg2:#ffffff; --text:#28323d; --soft:#5b6b7b; --muted:#8fa2b5;
    --accent:#5b8fc7;          /* 한층 진한 하늘색 */
    --accent-soft:#c9ddf1;
    --line:#dce8f3;
    --heading:'Cormorant Garamond','Noto Serif KR',serif;
    --serifko:'Noto Serif KR',serif;
    --sans:'Noto Sans KR',sans-serif;
    --shadow:0 18px 50px -26px rgba(45,80,115,.3);
    --radius:0px;
  }
  *{ -webkit-tap-highlight-color:transparent; box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  body{ background:#e8f1f9; font-family:var(--serifko); color:var(--text); }
  #app{ background:transparent; position:relative; overflow:hidden; }
  .frame{ max-width:430px; margin:0 auto; min-height:100vh; position:relative; background:var(--bg); overflow:hidden; }

  .en{ font-family:var(--heading); }
  .sans{ font-family:var(--sans); }
  .accent{ color:var(--accent); }

  /* 섹션 */
  .sec{ padding:64px 30px; position:relative; }
  .eyebrow{
    font-family:var(--heading); font-style:italic; font-size:21px; letter-spacing:.08em;
    text-transform:uppercase; color:var(--accent); margin-bottom:14px;
  }
  .stitle{ font-family:var(--serifko); font-weight:300; font-size:21px; letter-spacing:.28em; color:var(--text); }
  .rule{ width:1px; height:46px; background:var(--line); margin:0 auto; }
  .rule-h{ width:40px; height:1px; background:var(--accent-soft); margin:20px auto; }

  /* 등장 애니메이션 */
  .reveal{ opacity:0; transform:translateY(26px); transition:opacity 1s ease, transform 1s ease; }
  .reveal.in{ opacity:1; transform:none; }

  /* 버튼 / 인풋 */
  .btn{
    font-family:var(--sans); font-size:13.5px; font-weight:400; letter-spacing:.02em;
    border:1px solid var(--line); background:#fff; color:var(--text); text-decoration:none;
    transition:transform .15s ease, background .2s ease, border-color .2s ease;
  }
  .btn:active{ transform:scale(.97); }
  .btn-accent{ background:var(--accent); color:#fff; border-color:var(--accent); }
  .field{
    font-family:var(--sans); font-size:14px; width:100%; color:var(--text);
    background:var(--bg2); border:1px solid var(--line); padding:12px 14px;
    transition:border-color .2s ease, box-shadow .2s ease;
  }
  .field:focus{ outline:none; border-color:var(--accent); box-shadow:0 0 0 3px color-mix(in srgb, var(--accent) 14%, transparent); }
  .field::placeholder{ color:var(--muted); }

  /* ── 커버 (풀스크린 배경 사진) ── */
  /* 높이를 화면(vh)이 아니라 가로폭 기준 고정 비율로 → 스크롤해도 확대/이동 없음 */
  .cover{ width:100%; aspect-ratio:10/19; background:transparent; }
  /* 바깥 컨테이너가 위쪽 모서리만 둥글게 잘라냄(사진 요소엔 라운드 없음, 아래는 각짐) */
  .cover-clip{ width:100%; height:100%; overflow:hidden; }
  .cover-photo{ position:relative; width:100%; height:100%; overflow:hidden;
          display:flex; flex-direction:column; align-items:center; justify-content:space-between; text-align:center;
          padding:60px 26px calc(8px + env(safe-area-inset-bottom)); }
  .cover-img{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; object-position:center 50%; z-index:0; transform:scale(1.04); }
  .cover-top{ position:relative; z-index:1; margin-top:30px; font-family:'Cinzel',serif; font-weight:400;
              font-size:28px; line-height:1.25; letter-spacing:.08em; color:#fff; text-shadow:0 2px 18px rgba(0,0,0,.45); }
  .cover-inner{ position:relative; z-index:1; }
  .cover-names .n{ font-family:var(--heading); font-size:36px; font-weight:500; letter-spacing:.12em; color:#fff; text-shadow:0 2px 20px rgba(0,0,0,.45); }
  .cover-names .amp{ font-family:var(--heading); font-style:italic; font-size:22px; color:var(--accent-soft); margin:2px 0; display:block; text-shadow:0 2px 14px rgba(0,0,0,.4); }
  .cover-meta{ margin-top:14px; color:rgba(255,255,255,.96); font-family:var(--sans); font-size:13px; font-weight:400; letter-spacing:.05em; line-height:1.5; text-shadow:0 1px 14px rgba(0,0,0,.55); }

  /* ── 캘린더 ── */
  .cal{ max-width:320px; margin:8px auto 0; }
  .cal table{ width:100%; border-collapse:collapse; }
  .cal caption{ font-family:var(--heading); font-size:22px; letter-spacing:.1em; color:var(--text); padding-bottom:16px; }
  .cal th{ font-family:var(--sans); font-size:11px; font-weight:400; color:var(--muted); padding:8px 0; letter-spacing:.05em; }
  .cal td{ font-family:var(--sans); font-size:13.5px; color:var(--soft); padding:9px 0; text-align:center; position:relative; }
  .cal td.sun{ color:#c98a86; }
  .cal td.wed{ font-weight:500; }
  .cal td.wed .mark{
    position:absolute; inset:50% auto auto 50%; transform:translate(-50%,-50%);
    width:34px; height:34px; border-radius:50%; border:1.5px solid #94bde4; background:#94bde4; z-index:0;
  }
  .cal td .num{ position:relative; z-index:1; }
  .cd-row{ display:flex; justify-content:center; gap:6px; margin-top:26px; flex-wrap:wrap; align-items:center; }
  .cd-cell{ text-align:center; min-width:44px; }
  .cd-cell .n{ font-family:var(--heading); font-size:24px; color:var(--accent); line-height:1; }
  .cd-cell .l{ font-family:var(--sans); font-size:10px; color:var(--muted); margin-top:5px; letter-spacing:.08em; }
  .cd-colon{ font-family:var(--heading); font-size:20px; color:var(--muted); padding-bottom:14px; }
  .cd-summary{ text-align:center; margin-top:20px; font-family:var(--sans); font-size:13px; color:var(--soft); }
  .cd-summary b{ color:var(--accent); font-weight:500; }

  /* ── 갤러리 ── */
  .carousel{ display:flex; gap:10px; overflow-x:auto; scroll-snap-type:x mandatory; -ms-overflow-style:none; scrollbar-width:none; padding-bottom:4px; }
  .carousel::-webkit-scrollbar{ display:none; }
  .slide{ flex:0 0 82%; scroll-snap-align:center; overflow:hidden; box-shadow:var(--shadow); }
  .slide img{ width:100%; height:340px; object-fit:cover; display:block; }
  .gimg{ width:100%; aspect-ratio:1/1; object-fit:cover; display:block; cursor:pointer; transition:opacity .2s ease; }
  .gimg:active{ opacity:.8; }
  .gimg-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:5px; }
  /* 접기: 3줄(9장)까지만 노출, .expanded 되면 전체 표시 */
  .gimg-grid:not(.expanded) .gimg:nth-child(n+10){ display:none; }
  /* 더보기/접기 — 화살표만 */
  .gallery-toggle{ display:inline-flex; flex-direction:column; align-items:center; justify-content:center; gap:7px; padding:6px 12px; background:none; border:0; cursor:pointer; }
  .gallery-toggle .chev{ display:block; width:11px; height:11px; border-right:1.6px solid var(--soft); border-bottom:1.6px solid var(--soft); transform:translateY(-2px) rotate(45deg); transition:transform .35s ease; }
  .gallery-toggle.open .chev{ transform:translateY(2px) rotate(225deg); }
  .gallery-toggle-label{ font-family:var(--sans); font-size:11.5px; letter-spacing:.14em; color:var(--soft); }
  .gallery-toggle:active .chev{ border-color:var(--accent); }
  .gallery-toggle:active .gallery-toggle-label{ color:var(--accent); }

  /* ── 라이트박스(사진 확대 + 좌우 넘기기) ── */
  /* 라이트박스는 브라우저 전체가 아니라 청첩장 폭(최대 430px)에만 뜨도록 */
  .lb{ position:fixed; top:0; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:430px; z-index:200; background:#ffffff; display:none; }
  .lb.open{ display:block; }
  .lb-viewport{ position:absolute; inset:0; overflow:hidden; touch-action:none; }
  .lb-track{ display:flex; height:100%; will-change:transform; }
  .lb-track.anim{ transition:transform .34s cubic-bezier(.4,0,.2,1); }
  .lb-slide{ flex:0 0 100%; height:100%; display:flex; align-items:center; justify-content:center; padding:0 6%; }
  .lb-slide img{ max-width:100%; max-height:82%; object-fit:contain; border-radius:6px; box-shadow:0 20px 60px -18px rgba(0,0,0,.4); user-select:none; -webkit-user-drag:none; pointer-events:none; }
  .lb-close{ position:absolute; top:14px; right:14px; z-index:4; width:38px; height:38px; border:0; border-radius:50%; background:rgba(47,43,40,.1); color:var(--text); font-size:17px; line-height:1; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  .lb-close:active{ background:rgba(47,43,40,.2); }
  .lb-bar{ position:absolute; bottom:24px; left:50%; transform:translateX(-50%); display:flex; align-items:center; gap:20px; z-index:3; }
  .lb-arrow{ background:none; border:0; padding:2px 4px; color:var(--soft); font-family:var(--heading); font-size:30px; line-height:1; cursor:pointer; transition:color .2s ease, opacity .2s ease; }
  .lb-arrow:active{ color:var(--accent); }
  .lb-arrow:disabled{ opacity:.2; pointer-events:none; }
  .lb-page{ color:var(--soft); font-family:var(--sans); font-size:13px; letter-spacing:.16em; min-width:58px; text-align:center; }

  /* ── 축하 연락하기 팝업(바텀시트) ── */
  .cm{ position:fixed; top:0; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:430px; z-index:210; background:rgba(30,25,22,.42); display:none; align-items:flex-end; justify-content:center; }
  .cm.open{ display:flex; }
  .cm-panel{ position:relative; width:100%; background:var(--bg2); border-radius:22px 22px 0 0; padding:24px 24px 34px; box-shadow:0 -20px 50px -18px rgba(0,0,0,.3); transform:translateY(100%); transition:transform .32s cubic-bezier(.4,0,.2,1); }
  .cm.open .cm-panel{ transform:translateY(0); }
  .cm-close{ position:absolute; top:15px; right:16px; background:none; border:0; color:var(--muted); font-size:19px; line-height:1; cursor:pointer; }
  .cm-title{ text-align:center; font-size:15px; font-weight:500; color:var(--text); margin-bottom:18px; }
  .cm-tabs{ display:grid; grid-template-columns:1fr 1fr; margin-bottom:6px; border-bottom:1px solid var(--line); }
  .cm-tab{ background:none; border:0; padding:13px 0; font-family:var(--sans); font-size:14px; color:var(--muted); cursor:pointer; position:relative; }
  .cm-tab.active{ color:var(--accent); font-weight:500; }
  .cm-tab.active::after{ content:""; position:absolute; left:0; right:0; bottom:-1px; height:2px; background:var(--accent); }

  /* ── 카드 ── */
  .card{ background:#fff; border:1px solid var(--line); }
  /* 방명록 목록: 약 3개까지 보이고 스크롤 */
  .gb-scroll{ max-height:330px; overflow-y:auto; display:flex; flex-direction:column; gap:9px; padding-right:4px; -webkit-overflow-scrolling:touch; }
  .gb-scroll::-webkit-scrollbar{ width:4px; }
  .gb-scroll::-webkit-scrollbar-thumb{ background:var(--line); border-radius:4px; }
  .gb-scroll::-webkit-scrollbar-track{ background:transparent; }
  /* 방명록 1·2·3등 왕관 */
  .gb-crown{ position:relative; display:inline-flex; align-items:center; justify-content:center; width:20px; height:20px; margin-right:6px; flex:0 0 auto; }
  .gb-crown b{ position:absolute; top:57%; left:50%; transform:translate(-50%,-50%); font-family:var(--sans); font-size:9px; font-weight:700; color:#fff; line-height:1; }
  .acc-head{ display:flex; justify-content:space-between; align-items:center; padding:16px 18px; cursor:pointer; }
  .acc-body{ max-height:0; overflow:hidden; transition:max-height .35s ease; }
  .acc.open .acc-body{ max-height:520px; }
  .acc-chevron{ display:block; width:9px; height:9px; border-right:1.6px solid var(--muted); border-bottom:1.6px solid var(--muted); transform:translateY(-2px) rotate(45deg); transition:transform .3s ease; }
  .acc.open .acc-chevron{ transform:translateY(1px) rotate(225deg); }
  /* 계좌번호 클릭 복사(옆에 복사 아이콘) */
  .acct{ display:inline-flex; align-items:center; gap:7px; background:none; border:0; padding:2px 0; cursor:pointer; font-family:var(--sans); }
  .acct .acct-bank{ font-size:13px; color:var(--soft); }
  .acct .acct-num{ font-size:13.5px; color:var(--accent); letter-spacing:.01em; }
  .acct .acct-ico{ color:var(--muted); flex:0 0 auto; }
  .acct:active{ opacity:.55; }

  /* ── 토스트 ── */
  #toasts{ position:fixed; left:50%; bottom:40px; transform:translateX(-50%); z-index:300; display:flex; flex-direction:column; gap:8px; align-items:center; pointer-events:none; }  /* 팝업(210) 위, 로더(400) 아래 — 팝업 열린 상태에서도 안내가 보이게 */
  .toast{ background:rgba(47,43,40,.94); color:#fff; padding:11px 20px; border-radius:999px; font-family:var(--sans);
    font-size:13px; box-shadow:0 12px 30px -10px rgba(0,0,0,.5); opacity:0; transform:translateY(12px);
    transition:opacity .3s, transform .3s; display:flex; align-items:center; gap:8px; }
  .toast.show{ opacity:1; transform:none; }

  /* ── 초기 로딩 화면(폰트 로드 완료 전까지 표시 → 글씨체 깜빡임 방지) ── */
  /* & 글리프(Cormorant Garamond Italic)만 잘라 HTML에 내장 → 네트워크 로딩 없이 처음부터 같은 모양 */
  @font-face{
    font-family:'LoaderAmp'; font-style:normal; font-weight:400; unicode-range:U+26;
    src:url(data:font/woff2;base64,d09GMgABAAAAAARQAA8AAAAAB6QAAAP4AAEAAAAAAAAAAAAAAAAAAAAAAAAAAAAAG3QcLgZgP1NUQVREADwRCAqDdINHCwgAATYCJAMMBCAFhHAHIAwHG20GyAQe+PesPzfJKLcaqO1CHsBZKNMF5L8HFw92fOB+pgtOnbbo1H70W2JSJAVlU5mUZZxFEzY4nq3YukUHjPqIxMqPQgA6nclAy8krqcHtmzttAu7R00aOxz3BnDEJNxoON0FYjx85bRKRQDlNVwgnHEVEYfkV4l7UNcUtKZ+QTO2YBXPJ6Bna0x5VmYQ4JcS9zqnRByvxhdhCWJ6yTulv/ULxZjJpYihd+ZIk5yiKlSE+nE9S69MdZeVluSylMS3VA/9/ZCJaofAoJxDLlKnkb4yaIUQK4lay5otnjx4zQ0gYO8OcIB76XWivgBMvqChUhF1sAeWBukO5gbifURtoGUD4R5ICuij0Jmx9ZL2bBaZqQpaF8wB1JQ8X7Sy/7HjvBWihXL+rqklNs4XrWritaVL7AfPtc+pkI93gW72yxpCGXttIeuukoTeWHunVDR0EpBrQ971e3XCkkucFHe/v0RtJj54kvbq5LhgMNjseCsn1N9tUHLqnr3vwxHskEAjI9aGQ0cLv99cn3A+FzL3F0n27doml5+X6iyzx+/1+Y90usfTxC3L9c889J9fvNpQt2y3b+b+6cEdf9/zzz+vrdrBk716W7CFGxn7ZQKpfvpSzo2JQbscGlTsq0/M6ukbtip2yy1G+ePDmoet3xk4ZuLthfsPFg+zlDfN2uuobyIzZLQbK3JSKnRX9qlO6L6tqWP/TrswUmTOwaNewlNrU8h3D+uSm0E2mDOmUVpUw+tSt7OpBnTolvxxj/vxbnOdZ1LSL7tEpxdWtO6b70lMWqIPDIsYUbZidE/Xy3vZ12QMKigo75DeJO/HPQ7vT5Ui41aRd57qKquHlZsHXyP9iPI4Sr2fWpp4Jjr8joy5dlrbn7fo3scmXXvIkr748J9n5b6Q+ZYoesaUuqZpamjXg1ciNw5wpv0WqagvVfzBi1qaln5xMjbc2/v+F1ksr7TlcD3FAn8qxNv5fqfVSv+QKyXpVPEPwNSg/kNMCHV+3mTEC8knWtUOPFkXBEyLrYBI0Fw1NCjYRY1LJ40WTRlf2mcJws8QUTmcqjA564h4Q6i/cQkKFQ7TzU6CKkYxmJhMwmYbBSMYymjHMWOTOYArT6UsnFidbiZFMYhQXTmIGExiL72L5dEbSkclMYzTZASYyzFeQ/1OYl+mTGEEHCuEwPxXrRD4NYx98V2O605HOdKbLT/o3FtvGVZ/9tf0oo5wycumXmZpDy/rUY+8U5jJXaf7GdM3Ad/egMTWMYSSNfyJWIHsy4xiJ79Sfycwqpx6L0ynVmtGMleMzqacjPiYzkU5kY95wmJUWnE5ec2D6g7oqUptRaz7rd7AO0JUk846wVl7RNgIA) format('woff2');
  }
  #loader{ position:fixed; inset:0; z-index:400; background:#e8f1f9; display:flex; align-items:center; justify-content:center;
    transition:opacity .6s ease; }
  #loader.loaded{ opacity:0; pointer-events:none; }
  #loader.hidden{ display:none; }
  .loader-inner{ display:flex; flex-direction:column; align-items:center; gap:20px; }
  .loader-ring{ width:38px; height:38px; border-radius:50%; border:2px solid var(--accent-soft); border-top-color:var(--accent);
    animation:ldspin .85s linear infinite; }
  /* &는 내장 폰트(LoaderAmp)로 즉시 렌더 → 로딩 중 모양이 바뀌지 않음 (기울임 없음) */
  .loader-names{ font-family:'LoaderAmp',serif; font-size:19px; letter-spacing:.08em; color:var(--accent); }
  .loader-sub{ font-family:sans-serif; font-size:11px; letter-spacing:.28em; color:var(--muted); }
  @keyframes ldspin{ to{ transform:rotate(360deg); } }
  /* 자동재생 차단 환경: 스피너가 💌로 바뀌고 '터치해 초대장 열기' 안내로 전환 */
  #loader.tap{ cursor:pointer; }
  #loader.tap .loader-ring{ display:none; }
  .loader-tap-ico{ font-size:36px; line-height:1; animation:ldfloat 1.8s ease-in-out infinite; }
  #loader.tap .loader-sub{ color:var(--accent); letter-spacing:.08em; animation:ldpulse 1.6s ease-in-out infinite; }
  @keyframes ldpulse{ 0%,100%{ opacity:1; } 50%{ opacity:.35; } }
  @keyframes ldfloat{ 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-7px); } }

  .rsvp-lbl{ display:block; font-family:var(--sans); font-size:12px; color:var(--soft); margin-bottom:7px; letter-spacing:.04em; }
  .seg{ position:relative; display:block; cursor:pointer; }
  .seg input{ position:absolute; opacity:0; inset:0; }
  .seg span{ display:block; text-align:center; padding:12px 0; font-family:var(--sans); font-size:13px; border:1px solid var(--line); color:var(--soft); transition:all .2s ease; background:#fff; }
  .seg input:checked + span{ border-color:var(--accent); color:var(--accent); background:color-mix(in srgb, var(--accent) 8%, transparent); font-weight:500; }

  /* 은은하게 떨어지는 배경 효과 */
  .fx{ position:fixed; top:0; left:50%; transform:translateX(-50%); width:100%; max-width:430px; height:100%; z-index:100; pointer-events:none; }

  /* 배경음악 컨트롤 (상단 고정) */
  .bgm-ctrl{ position:fixed; top:0; left:50%; transform:translateX(-50%); width:100%; max-width:430px; z-index:150; pointer-events:none; }

function buildCalendar(){
  const el=document.getElementById('cal'); if(!el) return;
  const y=DATA.date.getFullYear(), m=DATA.date.getMonth(), wed=DATA.date.getDate();
  const first=new Date(y,m,1).getDay();
  const days=new Date(y,m+1,0).getDate();
  const dow=['일','월','화','수','목','금','토'];
  let rows='', cells=[];
  for(let i=0;i<first;i++) cells.push('');
  for(let d=1;d<=days;d++) cells.push(d);
  while(cells.length%7!==0) cells.push('');
  for(let i=0;i<cells.length;i+=7){
    const week=cells.slice(i,i+7).map((d,j)=>{
      if(d==='') return '<td></td>';
      const cls=[]; if(j===0) cls.push('sun'); if(d===wed) cls.push('wed');
      const mark = d===wed ? '<span class="mark"></span>' : '';
      return `<td class="${cls.join(' ')}">${mark}<span class="num">${d}</span></td>`;
    }).join('');
    rows+=`<tr>${week}</tr>`;
  }
  el.innerHTML=`
    <table>
      <caption>${y}. ${String(m+1).padStart(2,'0')}</caption>
      <thead><tr>${dow.map(d=>`<th>${d}</th>`).join('')}</tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

let cdTimer=null;
function startCountdown(){
  if(cdTimer) clearInterval(cdTimer);
  const row=document.getElementById('cdRow');
  const summary=document.getElementById('cdSummary');
  if(row) row.innerHTML=`
    <div class="cd-cell"><div class="n" id="cd-d">0</div><div class="l">DAYS</div></div>
    <div class="cd-colon">:</div>
    <div class="cd-cell"><div class="n" id="cd-h">00</div><div class="l">HOUR</div></div>
    <div class="cd-colon">:</div>
    <div class="cd-cell"><div class="n" id="cd-m">00</div><div class="l">MIN</div></div>
    <div class="cd-colon">:</div>
    <div class="cd-cell"><div class="n" id="cd-s">00</div><div class="l">SEC</div></div>`;
  const gn=DATA.groom.name.slice(1), bn=DATA.bride.name.slice(1);   // 이름(성 제외): 류영민→영민, 이소연→소연
  const tick=()=>{
    const now=new Date();
    let diff=Math.floor((DATA.date-now)/1000);
    const set=(id,v)=>{ const e=document.getElementById(id); if(e) e.textContent=v; };
    if(diff<=0){
      set('cd-d',0); set('cd-h','00'); set('cd-m','00'); set('cd-s','00');
      const passed=Math.floor(-diff/86400);
      if(summary) summary.innerHTML = passed<=0
        ? '오늘은 <b>결혼식 날</b>입니다 💍'
        : `${gn}♥${bn} 결혼식이 <b>${passed}일</b> 지났습니다.`;
      clearInterval(cdTimer); return;
    }
    const d=Math.floor(diff/86400); diff-=d*86400;
    const h=Math.floor(diff/3600); diff-=h*3600;
    const mi=Math.floor(diff/60); const s=diff-mi*60;
    set('cd-d',d); set('cd-h',String(h).padStart(2,'0'));
    set('cd-m',String(mi).padStart(2,'0')); set('cd-s',String(s).padStart(2,'0'));
    if(summary) summary.innerHTML=`${gn}♥${bn} 결혼식이 <b>${d}일</b> 남았습니다.`;
  };
  tick(); cdTimer=setInterval(tick,1000);
}

function showToast(msg, icon='✓'){
  const box=document.getElementById('toasts');
  // 같은 메시지가 이미 떠 있으면 중복으로 띄우지 않음(더블탭·중복 이벤트 방지)
  for(const t of box.children){ if(t.dataset.msg===msg) return; }
  const el=document.createElement('div'); el.className='toast'; el.dataset.msg=msg;
  el.innerHTML=`${icon?`<span>${icon}</span>`:''}<span>${esc(msg)}</span>`;   // icon이 빈 값이면 아이콘 없이 문구만
  box.appendChild(el);
  requestAnimationFrame(()=> el.classList.add('show'));
  setTimeout(()=>{ el.classList.remove('show'); setTimeout(()=>el.remove(),320); }, 2200);
}

const IS_ANDROID = /Android/i.test(navigator.userAgent);
async function copyText(text){
  try{
    let usedClipboardApi=false;
    if(navigator.clipboard && window.isSecureContext){ await navigator.clipboard.writeText(text); usedClipboardApi=true; }
    else{ const ta=document.createElement('textarea'); ta.value=text; ta.style.position='fixed'; ta.style.opacity='0'; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove(); }
    // 안드로이드 크롬은 클립보드 API 사용 시 OS가 "복사됨" 토스트를 자동으로 띄우므로 중복 방지 위해 생략
    if(!(usedClipboardApi && IS_ANDROID)) showToast('복사되었습니다');
  }catch(e){ showToast('복사에 실패했습니다','✕'); }
}

async function submitRsvp(payload){
  if(CONFIG.rsvpEndpoint){
    // JSONP로 서버의 실제 응답({ok:true})을 확인 — 실패하면 throw → 호출부가 실패 안내
    const res=await gbJsonp({ type:'rsvp', ...payload }, CONFIG.rsvpEndpoint);
    if(!(res && res.ok)) throw new Error('rsvp failed');
  }
  try{
    const key='rsvp_responses';
    const list=JSON.parse(localStorage.getItem(key)||'[]');
    list.push(payload); localStorage.setItem(key, JSON.stringify(list));
  }catch(e){}
}

/* 팝업이 열려 있을 때 '뒤로가기'로 페이지가 꺼지지 않고 팝업만 닫히게 */
function pushModalState(){ try{ history.pushState({ modal:true }, ''); }catch(e){} }
function popModalState(){ if(history.state && history.state.modal){ try{ history.back(); }catch(e){} } }
function closeTopModal(){

/* 커스텀 비밀번호 입력 팝업(네이티브 prompt 대체 — '~페이지의 내용' 문구 안 보이게) */
let pwResolve=null, pwVerify=null, pwBusy=false;
function closePw(val, fromPop){
  const m=document.getElementById('pwModal'); if(!m) return;
  if(!m.classList.contains('open')) return;
  m.classList.remove('open'); m.setAttribute('aria-hidden','true');
  document.body.style.overflow='';
  const sb=m.querySelector('#pwForm button[type=submit]');
  if(sb){ sb.disabled=false; sb.textContent='확인'; }
  pwBusy=false; pwVerify=null;
  if(!fromPop) popModalState();
  const r=pwResolve; pwResolve=null;
  if(r) r(val);
}
/* verify(값) → Promise<truthy>: 성공이면 팝업을 닫고, falsy면 재시도할 수 있게 열어 둔다.
   verify가 없으면 종전처럼 제출 즉시 값을 반환한다. */
function askPassword(verify){
  return new Promise(resolve=>{
    const m=document.getElementById('pwModal');
    const form=document.getElementById('pwForm');
    const input=document.getElementById('pwInput');
    const closeBtn=document.getElementById('pwClose');
    if(!m || !form || !input){ resolve(null); return; }
    if(pwResolve){ const prev=pwResolve; pwResolve=null; prev(null); }   // 이전 대기 정리
    pwResolve=resolve; pwVerify=verify||null; pwBusy=false;
    input.value='';
    if(!m.dataset.wired){
      m.dataset.wired='1';
      form.addEventListener('submit', async e=>{
        e.preventDefault();
        if(pwBusy || !pwResolve) return;
        const val=input.value;
        if(!pwVerify){ closePw(val); return; }        // 검증자 없으면 즉시 반환(종전 동작)
        pwBusy=true;
        const sb=form.querySelector('button[type=submit]');
        if(sb){ sb.disabled=true; sb.textContent='삭제 중…'; }
        let ok=false;
        try{ ok=await pwVerify(val); }catch(_){ ok=false; }
        if(ok){ closePw(val); }                        // 삭제 완료 → 팝업 닫힘
        else{                                           // 실패 → 재시도 위해 열어 둠
          pwBusy=false;
          if(sb){ sb.disabled=false; sb.textContent='확인'; }
          input.value=''; try{ input.focus(); }catch(_){}
        }
      });
      closeBtn.addEventListener('click', ()=>{ if(!pwBusy) closePw(null); });
      m.addEventListener('click', e=>{ if(e.target===m && !pwBusy) closePw(null); });
      document.addEventListener('keydown', e=>{ if(e.key==='Escape' && m.classList.contains('open') && !pwBusy) closePw(null); });
    }
    m.classList.add('open'); m.setAttribute('aria-hidden','false');
    document.body.style.overflow='hidden';
    pushModalState();
    setTimeout(()=>{ try{ input.focus(); }catch(e){} }, 60);
  });
}

let lbIndex=0, lbBuilt=false;
function buildLbTrack(){
  const track=document.getElementById('lbTrack'); if(!track) return;
  track.innerHTML=DATA.gallery.map(u=>`<div class="lb-slide"><img src="${u}" alt="확대 사진"></div>`).join('');
  lbBuilt=true;
}
function lbWidth(){ const t=document.getElementById('lbTrack'); return t ? t.clientWidth : 0; }
function updateLbUI(){
  const n=DATA.gallery.length;
  const page=document.getElementById('lbPage');
  if(page) page.textContent=`${lbIndex+1} / ${n}`;
}
function lbGoTo(i, anim=true){
  const n=DATA.gallery.length; if(!n) return;
  let wrap=false, t=i;
  if(i<0){ t=n-1; wrap=true; }            // 처음에서 이전 → 마지막
  else if(i>n-1){ t=0; wrap=true; }       // 마지막에서 다음 → 처음
  lbIndex=t;
  const track=document.getElementById('lbTrack'); if(!track) return;
  track.classList.toggle('anim', anim && !wrap);   // 순환 시엔 애니메이션 없이 점프
  track.style.transform=`translateX(${-lbIndex*lbWidth()}px)`;
  updateLbUI();
}
function openLightbox(i){
  if(!lbBuilt) buildLbTrack();
  const lb=document.getElementById('lightbox');
  lb.classList.add('open'); lb.setAttribute('aria-hidden','false');
  document.body.style.overflow='hidden';
  lbIndex=Math.max(0, Math.min(DATA.gallery.length-1, i));
  requestAnimationFrame(()=> lbGoTo(lbIndex, false));   // 열린 뒤 폭 측정하여 위치 세팅
  pushModalState();
}
function closeLightbox(fromPop){
  const lb=document.getElementById('lightbox');
  if(!lb.classList.contains('open')) return;
  lb.classList.remove('open'); lb.setAttribute('aria-hidden','true');
  document.body.style.overflow='';
  if(!fromPop) popModalState();
}
function wireLightbox(){
  const lb=document.getElementById('lightbox'); if(!lb || lb.dataset.wired) return;
  lb.dataset.wired='1';
  const vp=document.getElementById('lbViewport');
  const track=document.getElementById('lbTrack');
  document.getElementById('lbClose').addEventListener('click', e=>{ e.stopPropagation(); closeLightbox(); });
  document.getElementById('lbPrev').addEventListener('click', e=>{ e.stopPropagation(); lbGoTo(lbIndex-1); });
  document.getElementById('lbNext').addEventListener('click', e=>{ e.stopPropagation(); lbGoTo(lbIndex+1); });

  // 드래그/스와이프로 직접 밀어서 넘기기
  let dragging=false, startX=0, dx=0, moved=0, w=0;
  const onDown=x=>{ dragging=true; startX=x; dx=0; moved=0; w=lbWidth(); track.classList.remove('anim'); };
  const onMove=x=>{ if(!dragging) return; dx=x-startX; moved=Math.max(moved,Math.abs(dx));
    track.style.transform=`translateX(${-lbIndex*w+dx}px)`; };
  const onUp=()=>{ if(!dragging) return; dragging=false;
    if(Math.abs(dx)>w*0.18) lbGoTo(lbIndex + (dx<0?1:-1));
    else lbGoTo(lbIndex);   // 스냅백만 (닫기는 X 버튼으로)
  };
  vp.addEventListener('pointerdown', e=> onDown(e.clientX));
  window.addEventListener('pointermove', e=> onMove(e.clientX));
  window.addEventListener('pointerup', onUp);
  window.addEventListener('pointercancel', onUp);

  // 키보드(← → Esc)
  document.addEventListener('keydown', e=>{
    if(!lb.classList.contains('open')) return;
    if(e.key==='Escape') closeLightbox();
    else if(e.key==='ArrowRight') lbGoTo(lbIndex+1);
    else if(e.key==='ArrowLeft') lbGoTo(lbIndex-1);
  });

/* ============================================================
   배경음악 (상단 재생/정지 버튼)
   ============================================================ */
function wireBgm(){
  const audio=document.getElementById('bgm'), btn=document.getElementById('bgmToggle');
  if(!audio || !btn) return;
  audio.loop=true;                 // 무한 반복
  const MAXVOL=0.5, FADEIN=2, FADEOUT=4;   // 볼륨/페이드인(2초)/페이드아웃(초)
  audio.volume=0;
  audio.addEventListener('timeupdate', ()=>{
    const t=audio.currentTime, d=audio.duration;
    let v=MAXVOL;
    if(t<FADEIN) v=MAXVOL*(t/FADEIN);                                        // 시작: 2초 페이드 인(곡 길이 몰라도 동작)
    else if(d && isFinite(d) && t>d-FADEOUT) v=MAXVOL*((d-t)/FADEOUT);       // 끝: 페이드 아웃(곡 길이 알 때만)
    audio.volume=Math.max(0, Math.min(MAXVOL, v));
  });
  const IOS=/iPad|iPhone|iPod/.test(navigator.userAgent);
  audio.addEventListener('play', ()=>{                      // 시작 순간 무음 보장 + 디코더 글리치(첫 프레임 잡음) 마스킹
    if(audio.currentTime<FADEIN){
      audio.volume=0;                                       // 안드로이드/PC: 볼륨 0 + 페이드인으로 충분
      if(IOS){                                              // iOS만: 볼륨 조절이 안 되므로 muted로 마스킹
        audio.muted=true;                                   // (안드로이드에 적용하면 음소거 해제를 위반으로 보고 정지시켜 자동재생이 깨짐)
        setTimeout(()=>{ audio.muted=false; if(audio.paused) audio.play().catch(()=>{}); }, 200);
      }
    }
  });
  const sync=()=> btn.classList.toggle('playing', !audio.paused);
  audio.addEventListener('play', sync);
  audio.addEventListener('pause', sync);
  let userActed=false;
  btn.addEventListener('click', ()=>{
    userActed=true;
    if(audio.paused) audio.play().catch(()=>{}); else audio.pause();
  });
  const tryAuto=()=>{ if(!userActed && audio.paused) audio.play().catch(()=>{}); };

  // 브라우저 자동재생 정책 대응: 사용자 동작에서 재생 시도, 성공할 때까지 재시도
  const GESTURES=['pointerdown','touchstart','touchend','click','keydown','scroll'];
  const cleanup=()=> GESTURES.forEach(ev=> document.removeEventListener(ev, firstGesture));
  function firstGesture(e){
    if(e.target && e.target.closest && e.target.closest('#bgmToggle')) return;
    if(userActed || !audio.paused){ cleanup(); return; }
    const p=audio.play();
    if(p && p.then) p.then(cleanup).catch(()=>{});   // 실패 시 리스너 유지 → 다음 동작에서 재시도
    else cleanup();
  }
  GESTURES.forEach(ev=> document.addEventListener(ev, firstGesture, { passive:true }));

  document.addEventListener('visibilitychange', ()=>{ if(document.visibilityState==='visible') tryAuto(); });
}

/* 카카오맵(인터랙티브) — '메리빌리아' 검색으로 정확한 위치 표시 */
function initKakaoMap(){
  if(!CONFIG.kakaoJsKey) return;
  const el=document.getElementById('kakaoMap'); if(!el) return;
  const s=document.createElement('script');
  s.src=`https://dapi.kakao.com/v2/maps/sdk.js?appkey=${CONFIG.kakaoJsKey}&autoload=false&libraries=services`;
  s.onload=()=>{
    if(!window.kakao || !kakao.maps) return;
    kakao.maps.load(()=>{
      const fallback=new kakao.maps.LatLng(DATA.lat, DATA.lng);
      const map=new kakao.maps.Map(el, { center:fallback, level:3 });
      const marker=new kakao.maps.Marker({ map, position:fallback });
      try{
        const ps=new kakao.maps.services.Places();
        ps.keywordSearch('인천 송도 메리빌리아', (data, status)=>{
          if(status===kakao.maps.services.Status.OK && data && data[0]){
            const pos=new kakao.maps.LatLng(data[0].y, data[0].x);
            map.setCenter(pos); marker.setPosition(pos);
            // 카카오맵 버튼을 정확한 장소 상세 페이지로 연결(검색 화면 대신 핀 찍힌 장소가 바로 열림)
            const a=document.getElementById('mapKakao');
            if(a && data[0].place_url) a.href=data[0].place_url;
          }
        });
      }catch(e){}
      // 컨테이너가 나중에 보이며 회색으로 뜨는 것 방지(relayout 보정)
      const fix=()=>{ const c=map.getCenter(); map.relayout(); map.setCenter(c); };
      setTimeout(fix, 500);
      const sec=el.closest('.reveal') || el.closest('section');
      if(sec && 'IntersectionObserver' in window){
        const io2=new IntersectionObserver(es=>{ es.forEach(en=>{ if(en.isIntersecting){ fix(); } }); }, { threshold:.1 });
        io2.observe(sec);
      }
    });
  };
  document.head.appendChild(s);
}

// JSONP GET 요청(서버 응답을 실제로 읽음) — 목록 조회/등록/삭제/수정/RSVP 공용
function gbJsonp(params, endpoint){
  const url=endpoint||CONFIG.guestbookEndpoint;
  return new Promise(resolve=>{
    const cb='gbcb_'+Math.random().toString(36).slice(2);
    const s=document.createElement('script');
    const done=val=>{ clearTimeout(t); try{ delete window[cb]; }catch(e){} s.remove(); resolve(val); };
    const t=setTimeout(()=>done(null), 8000);
    window[cb]=data=> done(data);
    s.onerror=()=>done(null);
    const q=Object.keys(params).map(k=> encodeURIComponent(k)+'='+encodeURIComponent(params[k])).join('&');
    const sep=url.includes('?')?'&':'?';
    s.src=`${url}${sep}${q}&callback=${cb}`;
    document.body.appendChild(s);
  });
}
async function gbFetchRemote(){
  const data=await gbJsonp({ type:'guestbook' });
  if(data===null) return null;
  return Array.isArray(data) ? data : (data && data.entries) || [];
}
async function gbLoad(){
  let list=null;
  if(CONFIG.guestbookEndpoint) list=await gbFetchRemote();
  if(!list) list=gbLoadLocal();
  gbCache=list.slice().sort((a,b)=> new Date(b.date)-new Date(a.date));
  gbShown=GB_PAGE; gbRender();
}
async function gbAdd(entry){
  if(CONFIG.guestbookEndpoint){
    // JSONP로 서버의 실제 응답({ok:true})을 확인 — 실패하면 throw → 화면·로컬에 반영하지 않음
    const res=await gbJsonp({ type:'guestbook', action:'add', ...entry });
    if(!(res && res.ok)) throw new Error('add failed');
  }
  const local=gbLoadLocal(); local.push(entry); gbSaveLocal(local);
  gbCache.unshift(entry); gbRender();
}
async function gbDelete(id){
  const item=gbCache.find(c=>String(c.id)===String(id)); if(!item) return;

  const removeLocal=()=>{
    gbCache=gbCache.filter(c=>String(c.id)!==String(id));
    gbSaveLocal(gbLoadLocal().filter(c=>String(c.id)!==String(id)));
    gbRender(); showToast('메시지가 삭제되었습니다');
  };

  // 삭제가 실제로 완료되면 true를 반환 → 그때 비밀번호 팝업이 닫힘(틀리면 열린 채 재시도)
  await askPassword(async pass=>{
    if(CONFIG.guestbookEndpoint){
      // 서버의 실제 결과({ok,deleted,reason})로 판정
      const res=await gbJsonp({ type:'guestbook', action:'delete', id, password:pass });
      if(res && !Array.isArray(res) && typeof res==='object' && 'ok' in res){
        if(res.deleted || res.reason==='notfound'){ removeLocal(); return true; }
        showToast('비밀번호가 일치하지 않습니다','✕'); return false;
      }
      showToast('연결이 원활하지 않아요. 잠시 후 다시 시도해 주세요','⚠️'); return false;
    }

    // 로컬 전용(엔드포인트 없음): 클라이언트가 비밀번호 검증
    if(item.password!=null && item.password!=='' && String(pass)!==String(item.password)){
      showToast('비밀번호가 일치하지 않습니다','✕'); return false;
    }
    removeLocal(); return true;
  });
}

function gbEdit(id){

let editBusy=false;
function closeEdit(fromPop){
  const m=document.getElementById('editModal'); if(!m) return;

function openEditModal(item){
  const m=document.getElementById('editModal');
  const form=document.getElementById('editForm');
  const msg=document.getElementById('editMsg');
  const pw=document.getElementById('editPass');
  const closeBtn=document.getElementById('editClose');
  if(!m || !form || !msg || !pw) return;
  msg.value=item.message||''; pw.value='';
  if(!m.dataset.wired){
    m.dataset.wired='1';
    closeBtn.addEventListener('click', ()=> closeEdit());
    m.addEventListener('click', e=>{ if(e.target===m) closeEdit(); });
    document.addEventListener('keydown', e=>{ if(e.key==='Escape' && m.classList.contains('open')) closeEdit(); });
    form.addEventListener('submit', async e=>{
      e.preventDefault();
      if(editBusy) return;
      const newMsg=msg.value.trim(); const pass=pw.value;
      if(!newMsg){ showToast('내용을 입력해 주세요','✕'); return; }
      if(!pass){ showToast('비밀번호를 입력해 주세요','✕'); return; }
      const cur=m._item;
      if(cur && newMsg===(cur.message||'')){ closeEdit(); return; }   // 변경 없음
      const sb=form.querySelector('button[type=submit]'); const orig=sb?sb.textContent:'';
      editBusy=true;
      if(sb){ sb.disabled=true; sb.textContent='수정 중…'; }
      let ok=false;
      try{ ok=await gbSubmitEdit(cur, pass, newMsg); }catch(_){ ok=false; }
      if(ok){
        editBusy=false; closeEdit();                       // 완료 즉시 팝업 닫힘(삭제와 동일)
        showToast('완료되었습니다 ♥','');
      }else{
        editBusy=false;
        pw.value=''; try{ pw.focus(); }catch(_){}
      }
      if(sb){ sb.disabled=false; sb.textContent=orig; }
    });
  }
  m._item=item;
  m.classList.add('open'); m.setAttribute('aria-hidden','false');
  document.body.style.overflow='hidden';
  pushModalState();
  setTimeout(()=>{ try{ msg.focus(); }catch(e){} }, 60);

// 수정이 실제로 완료되면 true 반환 → 호출부(팝업)가 완료 문구를 띄운 뒤 닫음
async function gbSubmitEdit(item, pass, newMsg){
  if(!item) return false;
  const id=item.id;
  const applyLocal=()=>{
    gbCache=gbCache.map(c=> String(c.id)===String(id) ? Object.assign({}, c, { message:newMsg }) : c);
    gbSaveLocal(gbLoadLocal().map(c=> String(c.id)===String(id) ? Object.assign({}, c, { message:newMsg }) : c));
    gbRender();
  };

  if(CONFIG.guestbookEndpoint){
    // 서버의 실제 결과({ok,updated,reason})로 판정 — 응답이 없으면 실패 처리(원본 보존)
    const res=await gbJsonp({ type:'guestbook', action:'edit', id, password:pass, message:newMsg });
    if(res && !Array.isArray(res) && typeof res==='object' && 'ok' in res){
      if(res.updated){ applyLocal(); return true; }
      showToast('비밀번호가 일치하지 않습니다','✕'); return false;
    }
    showToast('연결이 원활하지 않아요. 잠시 후 다시 시도해 주세요','⚠️'); return false;
  }

  // 로컬 전용(엔드포인트 없음): 클라이언트가 비밀번호 검증
  if(item.password!=null && item.password!=='' && String(pass)!==String(item.password)){
    showToast('비밀번호가 일치하지 않습니다','✕'); return false;
  }
  applyLocal();
  return true;
}

/* 스크롤 등장 */
let io=null;
function observeReveal(){
  if(io) io.disconnect();
  io=new IntersectionObserver(es=>{
    es.forEach(en=>{ if(en.isIntersecting){ en.target.classList.add('in'); io.unobserve(en.target);} });
  },{ threshold:.12 });
  document.querySelectorAll('.reveal').forEach(el=>io.observe(el));
}

/* 은은하게 떨어지는 배경 효과 */
function initFx(){
  const c=document.getElementById('fx'); if(!c) return;
  const ctx=c.getContext('2d'); let w=0,h=0,dpr=1;
  function resize(){
    dpr=window.devicePixelRatio||1;
    w=c.clientWidth; h=c.clientHeight;
    c.width=w*dpr; c.height=h*dpr; ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  resize(); window.addEventListener('resize', resize);
  const N=10, P=[];
  for(let i=0;i<N;i++){
    P.push({
      x:Math.random()*w, y:Math.random()*h,
      r:7+Math.random()*4,               // 꽃잎 크기(한 장)
      sp:0.35+Math.random()*0.6,         // 낙하 속도
      sway:0.5+Math.random()*1.2,        // 좌우 흔들림
      ph:Math.random()*Math.PI*2,
      rot:Math.random()*Math.PI*2,
      rotSp:(-0.5+Math.random())*0.02,   // 회전 속도
      a:0.5+Math.random()*0.35           // 투명도(은은하게)
    });
  }
  function petal(px,py,r,rot,a){
    // 벚꽃잎 (끝이 살짝 갈라진 형태)
    ctx.save();
    ctx.translate(px,py); ctx.rotate(rot);
    ctx.fillStyle=`rgba(255,255,255,${a})`;
    ctx.shadowColor='rgba(210,180,195,0.55)'; ctx.shadowBlur=3;
    ctx.beginPath();
    ctx.moveTo(0, 0);                                             // 밑동(뾰족)
    ctx.bezierCurveTo(-r*0.62, -r*0.35, -r*0.5, -r*0.9, -r*0.16, -r);
    ctx.quadraticCurveTo(0, -r*0.8, r*0.16, -r);                 // 끝 갈라짐(V)
    ctx.bezierCurveTo(r*0.5, -r*0.9, r*0.62, -r*0.35, 0, 0);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }
  function tick(){
    ctx.clearRect(0,0,w,h);
    for(const p of P){
      p.y+=p.sp; p.ph+=0.01; p.rot+=p.rotSp;
      const x=p.x+Math.sin(p.ph)*p.sway*8;
      if(p.y>h+10){ p.y=-10; p.x=Math.random()*w; }
      petal(x, p.y, p.r, p.rot, p.a);
    }
    requestAnimationFrame(tick);
  }
  tick();
}

/* 초기 로딩 화면: 폰트·커버·BGM 로드 완료 후 음악과 함께 입장
   자동재생이 막힌 환경(아이폰 등)은 '화면을 터치해 주세요'로 전환 → 터치 순간 음악 시작+입장 */
function initLoader(){
  const loader=document.getElementById('loader'); if(!loader) return;
  const start=performance.now();
  const MIN_MS=700;                 // 최소 표시(깜빡임 방지)
  let done=false;
  const bgm=document.getElementById('bgm');
  const hide=()=>{
    const wait=Math.max(0, MIN_MS-(performance.now()-start));
    setTimeout(()=>{ loader.classList.add('loaded'); setTimeout(()=> loader.classList.add('hidden'), 650); }, wait);
  };
  const ready=()=>{
    if(done) return; done=true;
    // 로딩 종료 시 재생 시도 — 허용 환경(카톡 인앱 등)은 음악과 함께 자동 입장.
    // 차단 시: iOS(사파리)는 스크롤도 재생 제스처로 인정되므로 그냥 입장(wireBgm이 처리),
    // 안드로이드(삼성 인터넷 등 크로뮴)는 스크롤이 인정되지 않아 '터치하여 입장'으로 전환
    const enterByTap=()=>{
      loader.classList.add('tap');
      const ring=loader.querySelector('.loader-ring');
      if(ring) ring.outerHTML='<div class="loader-tap-ico">💌</div>';
      const sub=loader.querySelector('.loader-sub');
      if(sub) sub.textContent='화면을 터치해 초대장을 열어주세요';
      loader.addEventListener('pointerup', ()=>{ if(bgm) bgm.play().catch(()=>{}); hide(); }, {once:true});
    };
    const p=bgm ? bgm.play() : null;
    if(p && p.then){
      let acted=false;
      const once=fn=>()=>{ if(acted) return; acted=true; fn(); };
      p.then(once(hide)).catch(once(()=>{ IS_IOS ? hide() : enterByTap(); }));
      setTimeout(once(hide), 1500);   // 재생 판정이 늦어지면 그냥 입장(재생은 wireBgm이 이어받음)
    } else {
      hide();
    }
  };
  const waits=[];
  if(document.fonts && document.fonts.ready) waits.push(document.fonts.ready);
  // 방명록 메시지를 모두 받아 화면에 그린 뒤 입장 (gbJsonp 자체 8초 타임아웃이 있어 무한 대기 없음)
  if(gbLoadPromise) waits.push(gbLoadPromise.catch(()=>{}));
  const cover=document.querySelector('.cover-img');
  if(cover && !cover.complete){
    waits.push(new Promise(res=>{ cover.addEventListener('load',res,{once:true}); cover.addEventListener('error',res,{once:true}); }));
  }
  // BGM이 재생을 시작할 수 있는 시점(canplay)까지만 로딩 화면 유지 — 나머지는 재생 중 스트리밍
  // 단 iOS는 터치 전 오디오 사전 로딩을 막아 신호가 오지 않으므로 기다리지 않음(로딩 8초 걸리던 문제)
  const IS_IOS=/iPad|iPhone|iPod/.test(navigator.userAgent);
  if(bgm && !IS_IOS){
    if(bgm.readyState<3){
      waits.push(new Promise(res=>{ bgm.addEventListener('canplay',res,{once:true}); bgm.addEventListener('error',res,{once:true}); }));
    }
  }
  Promise.all(waits).then(ready);
  setTimeout(ready, 8000);           // 안전장치: 네트워크 지연 시 최대 대기
}

/* 방문자 집계: 페이지를 열 때마다 Visits 시트에 백그라운드로 기록 */
function initVisits(){
  if(!CONFIG.guestbookEndpoint) return;
  let uid=localStorage.getItem('visitUid');
  if(!uid){ uid=Math.random().toString(36).slice(2)+Date.now().toString(36); localStorage.setItem('visitUid', uid); }
  gbJsonp({ type:'visit', page:'v2', uid, ua:navigator.userAgent, ref:document.referrer||'' });
}

render();
initLoader();
initKakao();
initKakaoMap();

initFx();
initVisits();
window.addEventListener('popstate', closeTopModal);   // 뒤로가기 → 페이지 종료 대신 팝업만 닫기
